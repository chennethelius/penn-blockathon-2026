  <text x="1350" y="348" fill="#888" font-size="14">Business operator + AI agents</text>

  <rect x="1020" y="370" width="780" height="44" rx="4" fill="rgba(34,197,94,0.04)"/>
  <text x="1040" y="398" fill="#22c55e" font-size="16" font-weight="700">&#10003;</text>
  <text x="1070" y="398" fill="#fff" font-size="15" font-weight="600">Setup / onboarding</text>
  <text x="1350" y="398" fill="#888" font-size="14">Deploy agent via chat or MCP</text>

  <rect x="1020" y="420" width="780" height="44" rx="4" fill="rgba(34,197,94,0.06)"/>
  <text x="1040" y="448" fill="#22c55e" font-size="16" font-weight="700">&#10003;</text>
  <text x="1070" y="448" fill="#fff" font-size="15" font-weight="600">Payment action</text>
  <text x="1350" y="448" fill="#888" font-size="14">Trust-gated TRX send via TrustWallet</text>

  <rect x="1020" y="470" width="780" height="44" rx="4" fill="rgba(34,197,94,0.04)"/>
  <text x="1040" y="498" fill="#22c55e" font-size="16" font-weight="700">&#10003;</text>
  <text x="1070" y="498" fill="#fff" font-size="15" font-weight="600">Verifiable outcome</text>
  <text x="1350" y="498" fill="#888" font-size="14">TronScan tx hash for every action</text>

  <rect x="1020" y="520" width="780" height="44" rx="4" fill="rgba(34,197,94,0.06)"/>
  <text x="1040" y="548" fill="#22c55e" font-size="16" font-weight="700">&#10003;</text>
  <text x="1070" y="548" fill="#fff" font-size="15" font-weight="600">Fee / failure UX</text>
  <text x="1350" y="548" fill="#888" font-size="14">Clear blocked/approved messages + reason</text>

  <rect x="1020" y="570" width="780" height="44" rx="4" fill="rgba(34,197,94,0.04)"/>
  <text x="1040" y="598" fill="#22c55e" font-size="16" font-weight="700">&#10003;</text>
  <text x="1070" y="598" fill="#fff" font-size="15" font-weight="600">PSP tooling</text>
  <text x="1350" y="598" fill="#888" font-size="14">Trust-as-a-service for payment agents</text>

  <!-- Bottom: the pitch -->
  <rect x="100" y="700" width="1720" height="120" rx="10" fill="rgba(232,38,26,0.04)" stroke="rgba(232,38,26,0.15)" stroke-width="1"/>
  <text x="960" y="750" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">Built for businesses running AI payment agents.</text>
  <text x="960" y="790" text-anchor="middle" fill="#888" font-size="18">Deploy an agent. Set a trust policy. The contracts handle the rest.</text>
</svg>
